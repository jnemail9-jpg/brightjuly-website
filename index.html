<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BrightJuly — Coming soon</title>
  <meta name="description" content="BrightJuly is on the way. Something new, coming soon.">
  <meta property="og:title" content="BrightJuly — Coming soon">
  <meta property="og:description" content="BrightJuly is on the way. Something new, coming soon.">
  <meta property="og:image" content="https://brightjuly.com.au/og.png">
  <meta property="og:url" content="https://brightjuly.com.au">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0f0f10">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='28' fill='%23f5c451'/><circle cx='32' cy='32' r='12' fill='%230f0f10'/></svg>">
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
      background:#0f0f10;
      color:#f4f1ea;
      -webkit-font-smoothing:antialiased;
      line-height:1.5;
      display:flex;
      flex-direction:column;
      min-height:100%;
    }
    main{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:2rem 1.5rem;
    }
    .wrap{
      max-width:34rem;
      width:100%;
      text-align:left;
    }
    .badge{
      display:inline-block;
      font-size:.75rem;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#f5c451;
      margin-bottom:1.75rem;
    }
    h1{
      font-size:clamp(2.75rem,9vw,4.75rem);
      font-weight:600;
      letter-spacing:-.03em;
      line-height:1;
      margin:0 0 1.25rem;
    }
    h1 .accent{color:#f5c451}
    p.tag{
      font-size:clamp(1.05rem,2.4vw,1.25rem);
      color:#bdb8ad;
      margin:0 0 2.5rem;
      max-width:28rem;
    }
    .cta{
      display:inline-flex;
      align-items:center;
      gap:.55rem;
      padding:.85rem 1.25rem;
      background:#f5c451;
      color:#0f0f10;
      text-decoration:none;
      font-weight:600;
      border-radius:999px;
      transition:transform .15s ease, background .15s ease;
    }
    .cta:hover{background:#ffd368;transform:translateY(-1px)}
    .cta svg{width:1rem;height:1rem}
    footer{
      padding:1.25rem 1.5rem;
      font-size:.8rem;
      color:#6f6a60;
      text-align:left;
    }
    @media (min-width:640px){
      main{padding:3rem}
      footer{padding:1.5rem 3rem}
    }
  </style>
</head>
<body>
  <main>
    <div class="wrap">
      <span class="badge">Coming soon</span>
      <h1>Bright<span class="accent">July</span>.</h1>
      <p class="tag">Something new is on the way. Sign up to hear from us when we launch.</p>
      <a class="cta" href="mailto:hello@brightjuly.com.au?subject=Keep%20me%20posted">
        Get notified
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>
      </a>
    </div>
  </main>
  <footer>&copy; BrightJuly</footer>
</body>
</html>
