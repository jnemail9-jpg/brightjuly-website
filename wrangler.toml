# Cloudflare Pages config (enables `wrangler pages dev` + Functions in /functions).
name = "brightjuly-website"
compatibility_date = "2026-06-25"
pages_build_output_dir = "dist"

# ── Backend bindings (D1 + R2) ──────────────────────────────────────────────
# Live: the competition entries DB + photo-upload bucket exist and are bound.
# To recreate from scratch: `wrangler d1 create brightjuly-entries`,
# `wrangler r2 bucket create brightjuly-photos --location=apac`, then
# `wrangler d1 migrations apply brightjuly-entries --remote`.
[[d1_databases]]
binding = "DB"
database_name = "brightjuly-entries"
database_id = "e918a8c5-a0fc-4826-9221-2b2c38a16136"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "brightjuly-photos"

# Non-secret Brevo config. The sender (Bright July <noreply@brightjuly.com.au>) is
# hardcoded in functions/api/entry.ts. BREVO_API_KEY is a dashboard secret.
[vars]
BREVO_MARKETING_LIST_ID = "4"
BREVO_TEMPLATE_ID = ""
PUBLIC_TURNSTILE_SITE_KEY = "0x4AAAAAADrL6COa1NbftA1N"
