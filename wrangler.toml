# Cloudflare Pages config (enables `wrangler pages dev` + Functions in /functions).
name = "brightjuly-website"
compatibility_date = "2026-06-25"
pages_build_output_dir = "dist"

# ── Backend bindings (D1 + R2) ──────────────────────────────────────────────
# Commented out so Cloudflare Pages can deploy NOW: Pages fails the deployment if
# a binding points at a D1 database / R2 bucket that doesn't exist yet.
#
# To enable the competition backend (entries + photo uploads), one-time:
#   1.  wrangler d1 create brightjuly-entries          # copy the printed database_id
#   2.  wrangler r2 bucket create brightjuly-photos --location=apac
#   3.  paste the real database_id below, then uncomment BOTH blocks
#   4.  wrangler d1 migrations apply brightjuly-entries --remote
#   5.  redeploy
# This also restores local backend testing via `wrangler pages dev`.
#
# [[d1_databases]]
# binding = "DB"
# database_name = "brightjuly-entries"
# database_id = "PASTE-REAL-DATABASE-ID-HERE"
# migrations_dir = "migrations"
#
# [[r2_buckets]]
# binding = "PHOTOS"
# bucket_name = "brightjuly-photos"

# Non-secret Brevo config. The sender (Bright July <noreply@brightjuly.com.au>) is
# hardcoded in functions/api/entry.ts. BREVO_API_KEY is a dashboard secret.
[vars]
BREVO_MARKETING_LIST_ID = ""
BREVO_TEMPLATE_ID = ""
